services:
  # Cấu hình PostgreSQL + PostGIS
  hms-db:
    image: postgis/postgis:15-3.3
    container_name: hms_postgres
    environment:
      POSTGRES_USER: postgres
      POSTGRES_PASSWORD: hms_password_123
      POSTGRES_DB: hms_db
    ports:
      - "5432:5432"
    volumes:
      - hms_db_data:/var/lib/postgresql/data
    restart: unless-stopped

  # Cấu hình Redis
  hms-redis:
    image: redis:7.0-alpine
    container_name: hms_redis
    ports:
      - "6379:6379"
    restart: unless-stopped

volumes:
  hms_db_data: # Volume giúp dữ liệu không bị mất khi tắt Docker
